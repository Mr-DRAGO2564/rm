{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4>Complete Your Payment</h4>
            </div>
            <div class="card-body text-center">
                <h5>Total Amount: ₹{{ "%.2f"|format(total_amount) }}</h5>
                <p class="text-muted">Scan the QR Code below using any UPI app to pay.</p>
                
                <div class="my-4">
                    <img src="data:image/png;base64,{{ qr_b64 }}" alt="UPI QR Code" class="img-fluid border rounded p-2" style="max-width: 250px;">
                </div>

                <hr>

                <form action="{{ url_for('restaurant.checkout_confirm') }}" method="POST">
                    <div class="mb-3 text-start">
                        <label for="mobile_number" class="form-label">Mobile Number *</label>
                        <input type="tel" class="form-control" id="mobile_number" name="mobile_number" placeholder="Enter your mobile number" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label for="transaction_id" class="form-label">Transaction ID (Optional)</label>
                        <input type="text" class="form-control" id="transaction_id" name="transaction_id" placeholder="Enter UPI Reference No / UTR">
                    </div>
                    <button type="submit" class="btn btn-success w-100">I have paid</button>
                    <a href="{{ url_for('restaurant.cart') }}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
