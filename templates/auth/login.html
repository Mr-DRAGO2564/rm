{% extends "layout.html" %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 class="card-title" style="text-align: center; margin-bottom: 2rem; font-size: 1.75rem;">Welcome Back</h2>
        <form method="POST" action="">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input class="form-control" type="text" name="username" required autofocus placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--primary); font-weight: 600;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
