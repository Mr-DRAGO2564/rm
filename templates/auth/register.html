{% extends "layout.html" %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 class="card-title" style="text-align: center; margin-bottom: 2rem; font-size: 1.75rem;">Create Account</h2>
        <form method="POST" action="">
            <div class="form-group">
                <label class="form-label">Account Type</label>
                <select class="form-control" name="role" required>
                    <option value="restaurant">Restaurant (Buyer)</option>
                    <option value="supplier">Supplier (Seller)</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input class="form-control" type="text" name="username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required placeholder="Create a password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary); font-weight: 600;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
